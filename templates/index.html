<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equity Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; }

    #last-updated {
      font-size: 0.8rem;
      color: #64748b;
    }

    #refresh-btn {
      margin-left: auto;
      padding: 0.4rem 1rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.15s;
    }
    #refresh-btn:hover { background: #1d4ed8; }
    #refresh-btn:disabled { background: #334155; cursor: default; }

    /* Summary cards */
    #summary {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .card {
      background: #1e2332;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 1rem 1.4rem;
      min-width: 160px;
    }

    .card-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #94a3b8;
      margin-bottom: 0.3rem;
    }

    .card-value {
      font-size: 1.35rem;
      font-weight: 600;
    }

    /* Table */
    .table-wrapper {
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid #2d3748;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    thead tr { background: #1e2332; }

    th {
      padding: 0.75rem 1rem;
      text-align: right;
      font-weight: 600;
      color: #94a3b8;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    th:first-child { text-align: left; }
    th:hover { color: #e2e8f0; }
    th .sort-arrow { margin-left: 4px; opacity: 0.4; }
    th.sorted .sort-arrow { opacity: 1; color: #60a5fa; }

    tbody tr {
      border-top: 1px solid #1e2332;
      transition: background 0.1s;
    }
    tbody tr:hover { background: #1a1f2e; }

    td {
      padding: 0.7rem 1rem;
      text-align: right;
      white-space: nowrap;
    }
    td:first-child { text-align: left; font-weight: 600; letter-spacing: 0.02em; }

    .positive { color: #4ade80; }
    .negative { color: #f87171; }
    .neutral  { color: #94a3b8; }

    /* Delete button */
    .del-btn {
      background: none;
      border: none;
      color: #475569;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0 0.25rem;
      transition: color 0.15s;
    }
    .del-btn:hover { color: #f87171; }

    /* Add-position form */
    #add-form {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.75rem 1rem;
      border-top: 1px solid #2d3748;
      flex-wrap: wrap;
    }

    #add-form input {
      background: #0f1117;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.85rem;
      padding: 0.35rem 0.65rem;
      width: 110px;
      transition: border-color 0.15s;
    }
    #add-form input:focus { outline: none; border-color: #60a5fa; }
    #add-form input::placeholder { color: #475569; }

    #add-form button {
      padding: 0.35rem 0.9rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #add-form button:hover { background: #1d4ed8; }
    #add-form button:disabled { background: #334155; cursor: default; }

    #form-msg {
      font-size: 0.8rem;
      min-width: 120px;
    }

    /* Loading / error states */
    #status {
      text-align: center;
      padding: 3rem;
      color: #64748b;
      font-size: 0.9rem;
    }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid #334155;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Chart section */
    #chart-section {
      background: #1e2332;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 2rem;
    }

    #chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    #chart-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #94a3b8;
    }

    .period-btns { display: flex; gap: 0.4rem; }

    .period-btn {
      padding: 0.25rem 0.65rem;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid #334155;
      border-radius: 5px;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.15s;
    }
    .period-btn:hover { border-color: #60a5fa; color: #e2e8f0; }
    .period-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }

    #chart-container { position: relative; height: 280px; }

    #chart-loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #1e2332;
      font-size: 0.85rem;
      color: #64748b;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<header>
  <h1>Equity Tracker</h1>
  <span id="last-updated"></span>
  <button id="refresh-btn" onclick="loadPortfolio()">Refresh</button>
</header>

<div id="summary"></div>

<div id="chart-section">
  <div id="chart-header">
    <span id="chart-title">Price Return (%)</span>
    <div class="period-btns">
      <button class="period-btn" data-period="1mo">1M</button>
      <button class="period-btn" data-period="3mo">3M</button>
      <button class="period-btn" data-period="6mo">6M</button>
      <button class="period-btn active" data-period="1y">1Y</button>
    </div>
  </div>
  <div id="chart-container">
    <div id="chart-loading"><span class="spinner"></span>Loading chart…</div>
    <canvas id="price-chart"></canvas>
  </div>
</div>

<div class="table-wrapper">
  <table id="portfolio-table">
    <thead>
      <tr>
        <th data-col="ticker">Ticker <span class="sort-arrow">↕</span></th>
        <th data-col="shares">Shares <span class="sort-arrow">↕</span></th>
        <th data-col="cost_basis">Cost Basis <span class="sort-arrow">↕</span></th>
        <th data-col="current_price">Price <span class="sort-arrow">↕</span></th>
        <th data-col="market_value">Mkt Value <span class="sort-arrow">↕</span></th>
        <th data-col="pnl_dollars">P&L ($) <span class="sort-arrow">↕</span></th>
        <th data-col="pnl_pct">P&L (%) <span class="sort-arrow">↕</span></th>
        <th data-col="return_1y_pct">1Y Return <span class="sort-arrow">↕</span></th>
        <th></th>
      </tr>
    </thead>
    <tbody id="table-body">
      <tr><td colspan="9" id="status"><span class="spinner"></span>Loading portfolio…</td></tr>
    </tbody>
  </table>
  <div id="add-form">
    <input id="f-ticker"     type="text"   placeholder="Ticker"     maxlength="10" />
    <input id="f-shares"     type="number" placeholder="Shares"     min="0.0001" step="any" />
    <input id="f-cost-basis" type="number" placeholder="Cost Basis" min="0.0001" step="any" />
    <button id="add-btn" onclick="submitAdd()">+ Add Position</button>
    <span id="form-msg"></span>
  </div>
</div>

<script>
  const CHART_COLORS = [
    "#60a5fa", "#34d399", "#f59e0b", "#a78bfa",
    "#fb7185", "#38bdf8", "#facc15", "#4ade80",
  ];

  let chart = null;

  async function loadChart(period = "1y") {
    const loading = document.getElementById("chart-loading");
    loading.style.display = "flex";

    try {
      const res  = await fetch(`/api/history?period=${period}`);
      const json = await res.json();
      if (json.status !== "ok") throw new Error(json.message);

      const { dates, series } = json;
      const tickers = Object.keys(series);

      // Thin x-axis labels: show roughly 8 evenly spaced dates
      const step = Math.max(1, Math.floor(dates.length / 8));
      const labels = dates.map((d, i) => i % step === 0 ? d : "");

      const datasets = tickers.map((ticker, i) => ({
        label: ticker,
        data: series[ticker],
        borderColor: CHART_COLORS[i % CHART_COLORS.length],
        backgroundColor: "transparent",
        borderWidth: 2,
        pointRadius: 0,
        tension: 0.2,
        spanGaps: true,
      }));

      if (chart) {
        chart.data.labels   = dates;
        chart.data.datasets = datasets;
        chart.update();
      } else {
        const ctx = document.getElementById("price-chart").getContext("2d");
        chart = new Chart(ctx, {
          type: "line",
          data: { labels: dates, datasets },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: "index", intersect: false },
            plugins: {
              legend: {
                position: "top",
                align: "end",
                labels: {
                  color: "#94a3b8",
                  boxWidth: 12,
                  boxHeight: 2,
                  padding: 16,
                  font: { size: 11 },
                },
              },
              tooltip: {
                backgroundColor: "#1e2332",
                borderColor: "#2d3748",
                borderWidth: 1,
                titleColor: "#94a3b8",
                bodyColor: "#e2e8f0",
                padding: 10,
                callbacks: {
                  label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y != null ? (ctx.parsed.y >= 0 ? "+" : "") + ctx.parsed.y.toFixed(2) + "%" : "—"}`,
                },
              },
            },
            scales: {
              x: {
                ticks: {
                  color: "#475569",
                  font: { size: 10 },
                  maxRotation: 0,
                  callback: (_, i) => labels[i] || "",
                },
                grid: { color: "#1a1f2e" },
              },
              y: {
                ticks: {
                  color: "#475569",
                  font: { size: 10 },
                  callback: v => (v >= 0 ? "+" : "") + v + "%",
                },
                grid: { color: "#1a1f2e" },
              },
            },
          },
        });
      }
    } catch (err) {
      loading.textContent = "Chart error: " + err.message;
      loading.style.color = "#f87171";
      return;
    }

    loading.style.display = "none";
  }

  function reloadChart() {
    const active = document.querySelector(".period-btn.active");
    return loadChart(active ? active.dataset.period : "1y");
  }

  document.querySelectorAll(".period-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".period-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      loadChart(btn.dataset.period);
    });
  });

  let portfolioData = [];
  let sortCol = null;
  let sortAsc = true;

  const fmt = {
    currency: v => v == null ? "—" : "$" + v.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }),
    pct:      v => v == null ? "—" : (v >= 0 ? "+" : "") + v.toFixed(2) + "%",
    shares:   v => v == null ? "—" : v.toLocaleString("en-US"),
  };

  function colorClass(v) {
    if (v == null) return "neutral";
    return v >= 0 ? "positive" : "negative";
  }

  function renderTable(data) {
    const tbody = document.getElementById("table-body");
    if (!data.length) {
      tbody.innerHTML = `<tr><td colspan="9" id="status">No holdings found.</td></tr>`;
      return;
    }

    tbody.innerHTML = data.map(r => `
      <tr>
        <td>${r.ticker}</td>
        <td>${fmt.shares(r.shares)}</td>
        <td>${fmt.currency(r.cost_basis)}</td>
        <td>${fmt.currency(r.current_price)}</td>
        <td>${fmt.currency(r.market_value)}</td>
        <td class="${colorClass(r.pnl_dollars)}">${fmt.currency(r.pnl_dollars)}</td>
        <td class="${colorClass(r.pnl_pct)}">${fmt.pct(r.pnl_pct)}</td>
        <td class="${colorClass(r.return_1y_pct)}">${fmt.pct(r.return_1y_pct)}</td>
        <td><button class="del-btn" title="Remove ${r.ticker}" onclick="deleteHolding('${r.ticker}')">✕</button></td>
      </tr>
    `).join("");
  }

  async function deleteHolding(ticker) {
    if (!confirm(`Remove ${ticker} from your portfolio?`)) return;
    try {
      const res = await fetch(`/api/holdings/${ticker}`, { method: "DELETE" });
      const json = await res.json();
      if (json.status !== "ok") throw new Error(json.message);
      await Promise.all([loadPortfolio(), reloadChart()]);
    } catch (err) {
      alert("Error removing " + ticker + ": " + err.message);
    }
  }

  async function submitAdd() {
    const ticker    = document.getElementById("f-ticker").value.trim().toUpperCase();
    const shares    = parseFloat(document.getElementById("f-shares").value);
    const costBasis = parseFloat(document.getElementById("f-cost-basis").value);
    const msg       = document.getElementById("form-msg");
    const btn       = document.getElementById("add-btn");

    if (!ticker || isNaN(shares) || isNaN(costBasis)) {
      msg.textContent = "All fields required.";
      msg.style.color = "#f87171";
      return;
    }

    btn.disabled = true;
    btn.textContent = "Adding…";
    msg.textContent = "";

    try {
      const res  = await fetch("/api/holdings", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ticker, shares, cost_basis: costBasis }),
      });
      const json = await res.json();
      if (json.status !== "ok") throw new Error(json.message);

      document.getElementById("f-ticker").value     = "";
      document.getElementById("f-shares").value     = "";
      document.getElementById("f-cost-basis").value = "";
      msg.textContent = `${ticker} added.`;
      msg.style.color = "#4ade80";
      await Promise.all([loadPortfolio(), reloadChart()]);
    } catch (err) {
      msg.textContent = err.message;
      msg.style.color = "#f87171";
    } finally {
      btn.disabled = false;
      btn.textContent = "+ Add Position";
    }
  }

  function renderSummary(data) {
    const totalValue   = data.reduce((s, r) => s + (r.market_value ?? 0), 0);
    const totalCost    = data.reduce((s, r) => s + (r.shares * r.cost_basis), 0);
    const totalPnl     = totalValue - totalCost;
    const totalPnlPct  = totalCost ? (totalPnl / totalCost) * 100 : 0;
    const winners      = data.filter(r => (r.pnl_pct ?? 0) >= 0).length;

    document.getElementById("summary").innerHTML = `
      <div class="card">
        <div class="card-label">Total Value</div>
        <div class="card-value">${fmt.currency(totalValue)}</div>
      </div>
      <div class="card">
        <div class="card-label">Total Cost</div>
        <div class="card-value">${fmt.currency(totalCost)}</div>
      </div>
      <div class="card">
        <div class="card-label">Total P&amp;L</div>
        <div class="card-value ${colorClass(totalPnl)}">${fmt.currency(totalPnl)}</div>
      </div>
      <div class="card">
        <div class="card-label">P&amp;L %</div>
        <div class="card-value ${colorClass(totalPnlPct)}">${fmt.pct(totalPnlPct)}</div>
      </div>
      <div class="card">
        <div class="card-label">Positions</div>
        <div class="card-value">${data.length} <span style="font-size:0.8rem;color:#4ade80">(${winners} up)</span></div>
      </div>
    `;
  }

  async function loadPortfolio() {
    const btn = document.getElementById("refresh-btn");
    btn.disabled = true;
    btn.textContent = "Loading…";
    document.getElementById("table-body").innerHTML =
      `<tr><td colspan="8" id="status"><span class="spinner"></span>Fetching live prices…</td></tr>`;

    try {
      const res  = await fetch("/api/portfolio");
      const json = await res.json();
      if (json.status !== "ok") throw new Error(json.message);

      portfolioData = json.data;
      renderSummary(portfolioData);
      renderTable(portfolioData);

      const now = new Date();
      document.getElementById("last-updated").textContent =
        "Updated " + now.toLocaleTimeString();
    } catch (err) {
      document.getElementById("table-body").innerHTML =
        `<tr><td colspan="8" id="status" style="color:#f87171">Error: ${err.message}</td></tr>`;
    } finally {
      btn.disabled = false;
      btn.textContent = "Refresh";
    }
  }

  // Column sort
  document.querySelectorAll("th[data-col]").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.dataset.col;
      if (sortCol === col) {
        sortAsc = !sortAsc;
      } else {
        sortCol = col;
        sortAsc = true;
      }

      document.querySelectorAll("th").forEach(t => t.classList.remove("sorted"));
      th.classList.add("sorted");
      th.querySelector(".sort-arrow").textContent = sortAsc ? "↑" : "↓";

      const sorted = [...portfolioData].sort((a, b) => {
        const av = a[col], bv = b[col];
        if (av == null) return 1;
        if (bv == null) return -1;
        if (typeof av === "string") return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
        return sortAsc ? av - bv : bv - av;
      });
      renderTable(sorted);
    });
  });

  loadPortfolio();
  loadChart("1y");
</script>
</body>
</html>
