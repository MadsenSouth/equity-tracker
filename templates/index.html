<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equity Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; }
    #last-updated { font-size: 0.8rem; color: #64748b; }
    #refresh-btn {
      margin-left: auto;
      padding: 0.4rem 1rem;
      background: #2563eb; color: #fff;
      border: none; border-radius: 6px;
      cursor: pointer; font-size: 0.85rem;
      transition: background 0.15s;
    }
    #refresh-btn:hover { background: #1d4ed8; }
    #refresh-btn:disabled { background: #334155; cursor: default; }

    /* ── Portfolio list ── */
    .p-table {
      width: 100%;
      border: 1px solid #2d3748;
      border-radius: 10px;
      overflow: hidden;
    }

    .p-header {
      display: grid;
      grid-template-columns: 1fr 130px 120px 90px 100px 72px;
      background: #1e2332;
      padding: 0.6rem 1rem;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #64748b;
    }
    .p-header span:not(:first-child) { text-align: right; }

    .p-block { border-top: 1px solid #1e2332; }
    .p-block:first-child { border-top: none; }

    .p-row {
      display: grid;
      grid-template-columns: 1fr 130px 120px 90px 100px 72px;
      align-items: center;
      padding: 0.8rem 1rem;
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
    }
    .p-row:hover { background: #1a1f2e; }
    .p-row.expanded { background: #1a1f2e; }

    .p-row > * { font-size: 0.88rem; }
    .p-row > *:not(:first-child) { text-align: right; }

    .p-name {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
    }
    .chevron {
      font-size: 0.65rem;
      color: #475569;
      transition: transform 0.2s;
      display: inline-block;
    }
    .chevron.open { transform: rotate(90deg); }

    .p-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.3rem;
    }

    /* ── Detail panel ── */
    .p-detail {
      display: none;
      padding: 1.25rem 1rem 1.5rem;
      border-top: 1px solid #2d3748;
      background: #0f1117;
    }
    .p-detail.open { display: block; }

    /* ── Chart ── */
    .chart-section {
      background: #1e2332;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
    }
    .chart-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.9rem;
    }
    .chart-title {
      font-size: 0.72rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em; color: #64748b;
    }
    .period-btns { display: flex; gap: 0.35rem; }
    .period-btn {
      padding: 0.22rem 0.6rem; font-size: 0.72rem; font-weight: 600;
      border: 1px solid #334155; border-radius: 5px;
      background: transparent; color: #94a3b8; cursor: pointer;
      transition: all 0.15s;
    }
    .period-btn:hover { border-color: #60a5fa; color: #e2e8f0; }
    .period-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }
    .chart-wrap { position: relative; height: 240px; }
    .chart-loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #1e2332; font-size: 0.82rem; color: #64748b;
    }

    /* Custom date range row */
    .custom-range {
      display: none;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0 0.6rem;
      flex-wrap: wrap;
    }
    .custom-range.open { display: flex; }
    .custom-range input[type="date"] { width: auto; }
    .custom-range .arrow { color: #475569; font-size: 0.85rem; }
    .custom-range .apply-btn {
      padding: 0.22rem 0.7rem; font-size: 0.75rem; font-weight: 600;
      background: #2563eb; color: #fff;
      border: none; border-radius: 5px; cursor: pointer;
      transition: background 0.15s;
    }
    .custom-range .apply-btn:hover { background: #1d4ed8; }
    .custom-range .range-msg { font-size: 0.75rem; color: #f87171; }

    /* ── Holdings table ── */
    .holdings-wrap {
      border: 1px solid #2d3748;
      border-radius: 10px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    thead tr { background: #1e2332; }
    th {
      padding: 0.65rem 0.9rem; text-align: right;
      font-size: 0.72rem; font-weight: 600; color: #64748b;
      text-transform: uppercase; letter-spacing: 0.06em;
      white-space: nowrap; cursor: pointer; user-select: none;
    }
    th:first-child { text-align: left; }
    th:last-child  { cursor: default; }
    th:hover:not(:last-child) { color: #e2e8f0; }
    th .sa { margin-left: 3px; opacity: 0.35; }
    th.sorted .sa { opacity: 1; color: #60a5fa; }

    tbody tr { border-top: 1px solid #1e2332; transition: background 0.1s; }
    tbody tr:hover { background: #1a1f2e; }
    td { padding: 0.6rem 0.9rem; text-align: right; white-space: nowrap; }
    td:first-child { text-align: left; font-weight: 600; }
    td:last-child  { text-align: right; }

    .positive { color: #4ade80; }
    .negative { color: #f87171; }
    .neutral  { color: #94a3b8; }

    /* ── Action buttons ── */
    .del-btn, .edit-btn, .save-btn, .cancel-btn {
      background: none; border: none; cursor: pointer;
      font-size: 0.95rem; line-height: 1; padding: 0 0.2rem;
      transition: color 0.15s;
    }
    .del-btn    { color: #475569; } .del-btn:hover    { color: #f87171; }
    .edit-btn   { color: #475569; } .edit-btn:hover   { color: #60a5fa; }
    .save-btn   { color: #475569; } .save-btn:hover   { color: #4ade80; }
    .cancel-btn { color: #475569; } .cancel-btn:hover { color: #94a3b8; }

    .edit-input {
      background: #0f1117; border: 1px solid #60a5fa;
      border-radius: 4px; color: #e2e8f0;
      font-size: 0.82rem; padding: 0.18rem 0.35rem;
      width: 76px; text-align: right;
    }
    .edit-input-date { width: 118px; text-align: left; }
    .edit-input:focus { outline: none; }

    /* date inputs: force dark styling across browsers */
    input[type="date"] {
      color-scheme: dark;
      background: #0f1117; border: 1px solid #334155; border-radius: 6px;
      color: #e2e8f0; font-size: 0.82rem; padding: 0.3rem 0.55rem;
    }
    input[type="date"]:focus { outline: none; border-color: #60a5fa; }

    /* ── Add-position form ── */
    .add-form {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.65rem 0.9rem;
      border-top: 1px solid #2d3748;
      flex-wrap: wrap;
    }
    .add-form input {
      background: #0f1117; border: 1px solid #334155; border-radius: 6px;
      color: #e2e8f0; font-size: 0.82rem; padding: 0.3rem 0.55rem;
      width: 100px; transition: border-color 0.15s;
    }
    .add-form input:focus { outline: none; border-color: #60a5fa; }
    .add-form input::placeholder { color: #475569; }
    .add-form button {
      padding: 0.3rem 0.8rem; background: #2563eb; color: #fff;
      border: none; border-radius: 6px; cursor: pointer;
      font-size: 0.82rem; font-weight: 600; white-space: nowrap;
      transition: background 0.15s;
    }
    .add-form button:hover { background: #1d4ed8; }
    .add-form button:disabled { background: #334155; cursor: default; }
    .form-msg { font-size: 0.78rem; }

    /* ── New portfolio row ── */
    .new-p-row {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.7rem 1rem;
      border-top: 1px solid #1e2332;
    }
    .new-p-row input {
      background: #0f1117; border: 1px solid #334155; border-radius: 6px;
      color: #e2e8f0; font-size: 0.85rem; padding: 0.3rem 0.6rem;
      width: 180px; transition: border-color 0.15s;
    }
    .new-p-row input:focus { outline: none; border-color: #60a5fa; }
    .new-p-row input::placeholder { color: #475569; }
    .new-p-row button {
      padding: 0.3rem 0.8rem; background: #1e2332; color: #94a3b8;
      border: 1px solid #334155; border-radius: 6px; cursor: pointer;
      font-size: 0.82rem; font-weight: 600;
      transition: all 0.15s;
    }
    .new-p-row button:hover { background: #2563eb; border-color: #2563eb; color: #fff; }
    .new-p-msg { font-size: 0.78rem; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #334155; border-top-color: #60a5fa;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #page-loading {
      text-align: center; padding: 4rem; color: #64748b; font-size: 0.9rem;
    }

    /* ── Import bar ── */
    #import-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1rem;
      padding: 0.65rem 1rem;
      background: #1e2332;
      border: 1px solid #2d3748;
      border-radius: 10px;
      flex-wrap: wrap;
    }

    .import-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #64748b;
      margin-right: 0.25rem;
    }

    .template-btn, .upload-btn {
      padding: 0.32rem 0.85rem;
      font-size: 0.82rem;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      white-space: nowrap;
    }
    .template-btn {
      background: transparent;
      border: 1px solid #334155;
      color: #94a3b8;
    }
    .template-btn:hover { border-color: #60a5fa; color: #e2e8f0; }

    .upload-btn {
      background: #2563eb;
      border: 1px solid #2563eb;
      color: #fff;
    }
    .upload-btn:hover { background: #1d4ed8; }
    .upload-btn.loading { background: #334155; border-color: #334155; cursor: default; }

    #import-result {
      font-size: 0.8rem;
      flex: 1;
    }
    #import-result .ok   { color: #4ade80; }
    #import-result .warn { color: #f59e0b; }
    #import-result .err  { color: #f87171; }
  </style>
</head>
<body>

<header>
  <h1>Equity Tracker</h1>
  <span id="last-updated"></span>
  <button id="refresh-btn" onclick="loadPortfolios()">Refresh</button>
</header>

<div id="portfolios-root">
  <div id="page-loading"><span class="spinner"></span>Loading portfolios…</div>
</div>

<div id="import-bar">
  <span class="import-label">Excel</span>
  <a class="template-btn" href="/api/template" download>⬇ Download Template</a>
  <label class="upload-btn" id="upload-label">
    ↑ Import File
    <input type="file" id="import-file-input" accept=".xlsx,.xls"
           style="display:none" onchange="importFile(event)">
  </label>
  <div id="import-result"></div>
</div>

<script>
  const COLORS = ["#60a5fa","#34d399","#f59e0b","#a78bfa","#fb7185","#38bdf8","#facc15","#4ade80"];

  // state
  let summaries   = [];          // [{name, total_value, pnl_dollars, pnl_pct, return_1y_pct}]
  let holdings    = {};          // {name: [row, ...]}
  let sortState   = {};          // {name: {col, asc}}
  let charts      = {};          // {name: Chart}
  let expanded    = null;        // currently open portfolio name

  /* ── Formatters ── */
  const fmt = {
    usd:  v => v == null ? "—" : "$" + v.toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2}),
    pct:  v => v == null ? "—" : (v >= 0 ? "+" : "") + v.toFixed(2) + "%",
    num:  v => v == null ? "—" : v.toLocaleString("en-US"),
    held: d => d == null ? "—" : d < 30 ? `${d}d` : d < 365 ? `${Math.round(d / 30)}mo` : `${(d / 365).toFixed(1)}yr`,
  };
  const cc = v => v == null ? "neutral" : v >= 0 ? "positive" : "negative";

  /* ══════════════════════════════════════════
     PORTFOLIOS SUMMARY
  ══════════════════════════════════════════ */

  async function loadPortfolios() {
    const btn = document.getElementById("refresh-btn");
    btn.disabled = true; btn.textContent = "Loading…";

    try {
      const res  = await fetch("/api/portfolios");
      const json = await res.json();
      if (json.status !== "ok") throw new Error(json.message);
      summaries = json.data;
      renderPortfolioList();
      document.getElementById("last-updated").textContent =
        "Updated " + new Date().toLocaleTimeString();

      // Re-expand portfolio that was open, and reload its data
      if (expanded && summaries.find(s => s.name === expanded)) {
        await openPortfolio(expanded, /*reopen=*/true);
      }
    } catch (err) {
      document.getElementById("portfolios-root").innerHTML =
        `<p style="color:#f87171;padding:2rem">Error: ${err.message}</p>`;
    } finally {
      btn.disabled = false; btn.textContent = "Refresh";
    }
  }

  function renderPortfolioList() {
    const root = document.getElementById("portfolios-root");

    const headerHTML = `
      <div class="p-header">
        <span>Portfolio</span>
        <span>Value</span>
        <span>P&amp;L ($)</span>
        <span>P&amp;L (%)</span>
        <span>1Y Return</span>
        <span></span>
      </div>`;

    const blocksHTML = summaries.map(s => portfolioBlockHTML(s)).join("");

    const newRowHTML = `
      <div class="new-p-row">
        <input id="new-p-name" type="text" placeholder="New portfolio name" maxlength="40" />
        <button onclick="createPortfolio()">+ New Portfolio</button>
        <span class="new-p-msg" id="new-p-msg"></span>
      </div>`;

    root.innerHTML = `<div class="p-table">${headerHTML}${blocksHTML}${newRowHTML}</div>`;

    // Re-attach Enter key on new portfolio input
    document.getElementById("new-p-name").addEventListener("keydown", e => {
      if (e.key === "Enter") createPortfolio();
    });
  }

  function portfolioBlockHTML(s) {
    return `
      <div class="p-block" id="pb-${CSS.escape(s.name)}">
        <div class="p-row${expanded === s.name ? " expanded" : ""}"
             onclick="togglePortfolio('${s.name}')">
          <div class="p-name">
            <span class="chevron${expanded === s.name ? " open" : ""}">▶</span>
            ${s.name}
          </div>
          <div>${fmt.usd(s.total_value)}</div>
          <div class="${cc(s.pnl_dollars)}">${fmt.usd(s.pnl_dollars)}</div>
          <div class="${cc(s.pnl_pct)}">${fmt.pct(s.pnl_pct)}</div>
          <div class="${cc(s.return_1y_pct)}">${fmt.pct(s.return_1y_pct)}</div>
          <div class="p-actions" onclick="event.stopPropagation()">
            <button class="del-btn" title="Delete portfolio"
                    onclick="deletePortfolio('${s.name}')">✕</button>
          </div>
        </div>
        <div class="p-detail${expanded === s.name ? " open" : ""}" id="pd-${CSS.escape(s.name)}">
          ${detailPanelHTML(s.name)}
        </div>
      </div>`;
  }

  function detailPanelHTML(name) {
    const esc = CSS.escape(name);
    return `
      <div class="chart-section">
        <div class="chart-header">
          <span class="chart-title">Price Return (%)</span>
          <div class="period-btns" id="pbtns-${esc}">
            <button class="period-btn" data-period="1mo">1M</button>
            <button class="period-btn" data-period="3mo">3M</button>
            <button class="period-btn" data-period="6mo">6M</button>
            <button class="period-btn active" data-period="1y">1Y</button>
            <button class="period-btn" data-period="custom">Custom</button>
          </div>
        </div>
        <div class="custom-range" id="cr-${esc}">
          <input type="date" id="crs-${esc}" title="Start date" />
          <span class="arrow">→</span>
          <input type="date" id="cre-${esc}" title="End date" />
          <button class="apply-btn" onclick="applyCustomRange('${name}')">Apply</button>
          <span class="range-msg" id="crm-${esc}"></span>
        </div>
        <div class="chart-wrap">
          <div class="chart-loading" id="cl-${esc}"><span class="spinner"></span>Loading…</div>
          <canvas id="chart-${esc}"></canvas>
        </div>
      </div>

      <div class="holdings-wrap">
        <table>
          <thead>
            <tr>
              <th data-p="${name}" data-col="ticker">Ticker <span class="sa">↕</span></th>
              <th data-p="${name}" data-col="shares">Shares <span class="sa">↕</span></th>
              <th data-p="${name}" data-col="cost_basis">Cost Basis <span class="sa">↕</span></th>
              <th data-p="${name}" data-col="purchase_date">Purchased <span class="sa">↕</span></th>
              <th data-p="${name}" data-col="days_held">Held <span class="sa">↕</span></th>
              <th data-p="${name}" data-col="current_price">Price <span class="sa">↕</span></th>
              <th data-p="${name}" data-col="market_value">Mkt Value <span class="sa">↕</span></th>
              <th data-p="${name}" data-col="pnl_dollars">P&amp;L ($) <span class="sa">↕</span></th>
              <th data-p="${name}" data-col="pnl_pct">P&amp;L (%) <span class="sa">↕</span></th>
              <th data-p="${name}" data-col="ann_return_pct">Ann. Return <span class="sa">↕</span></th>
              <th></th>
            </tr>
          </thead>
          <tbody id="hbody-${esc}">
            <tr><td colspan="11" style="text-align:center;padding:1.5rem;color:#64748b">
              <span class="spinner"></span>Loading holdings…
            </td></tr>
          </tbody>
        </table>
        <div class="add-form">
          <input id="ft-${esc}"  type="text"   placeholder="Ticker"         maxlength="10" />
          <input id="fs-${esc}"  type="number" placeholder="Shares"         min="0.0001" step="any" />
          <input id="fcb-${esc}" type="number" placeholder="Cost Basis"     min="0.0001" step="any" />
          <input id="fpd-${esc}" type="date"   title="Purchase date (optional)" />
          <button id="fab-${esc}" onclick="submitAdd('${name}')">+ Add</button>
          <span class="form-msg" id="fmsg-${esc}"></span>
        </div>
      </div>`;
  }

  /* ══════════════════════════════════════════
     EXPAND / COLLAPSE
  ══════════════════════════════════════════ */

  async function togglePortfolio(name) {
    if (expanded === name) {
      // collapse
      expanded = null;
      const detail = document.getElementById(`pd-${CSS.escape(name)}`);
      const row    = detail?.previousElementSibling;
      detail?.classList.remove("open");
      row?.classList.remove("expanded");
      row?.querySelector(".chevron")?.classList.remove("open");
    } else {
      // collapse previous
      if (expanded) {
        const prev = document.getElementById(`pd-${CSS.escape(expanded)}`);
        const prevRow = prev?.previousElementSibling;
        prev?.classList.remove("open");
        prevRow?.classList.remove("expanded");
        prevRow?.querySelector(".chevron")?.classList.remove("open");
      }
      expanded = name;
      await openPortfolio(name);
    }
  }

  async function openPortfolio(name, reopen = false) {
    const esc    = CSS.escape(name);
    const detail = document.getElementById(`pd-${esc}`);
    const row    = detail?.previousElementSibling;
    if (!detail) return;

    detail.classList.add("open");
    row?.classList.add("expanded");
    row?.querySelector(".chevron")?.classList.add("open");

    // Wire up period buttons
    document.querySelectorAll(`#pbtns-${esc} .period-btn`).forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(`#pbtns-${esc} .period-btn`).forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        const cr = document.getElementById(`cr-${esc}`);
        if (btn.dataset.period === "custom") {
          cr?.classList.add("open");
          // default end to today, start to 1 year ago
          const end   = new Date();
          const start = new Date(); start.setFullYear(start.getFullYear() - 1);
          const toISO = d => d.toISOString().slice(0, 10);
          const sEl = document.getElementById(`crs-${esc}`);
          const eEl = document.getElementById(`cre-${esc}`);
          if (sEl && !sEl.value) sEl.value = toISO(start);
          if (eEl && !eEl.value) eEl.value = toISO(end);
        } else {
          cr?.classList.remove("open");
          document.getElementById(`crm-${esc}`).textContent = "";
          loadChart(name, btn.dataset.period);
        }
      });
    });

    // Apply on Enter in end-date field
    document.getElementById(`cre-${esc}`)?.addEventListener("keydown", e => {
      if (e.key === "Enter") applyCustomRange(name);
    });

    // Wire up sort headers
    document.querySelectorAll(`th[data-p="${name}"][data-col]`).forEach(th => {
      th.addEventListener("click", () => sortHoldings(name, th));
    });

    await Promise.all([loadHoldings(name), loadChart(name, "1y")]);
  }

  /* ══════════════════════════════════════════
     HOLDINGS
  ══════════════════════════════════════════ */

  async function loadHoldings(name) {
    const esc  = CSS.escape(name);
    const tbody = document.getElementById(`hbody-${esc}`);
    if (!tbody) return;

    try {
      const res  = await fetch(`/api/portfolios/${encodeURIComponent(name)}/holdings`);
      const json = await res.json();
      if (json.status !== "ok") throw new Error(json.message);
      holdings[name] = json.data;
      sortState[name] = sortState[name] || { col: null, asc: true };
      renderHoldings(name);
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="9" style="color:#f87171;text-align:center;padding:1rem">Error: ${err.message}</td></tr>`;
    }
  }

  function renderHoldings(name) {
    const esc   = CSS.escape(name);
    const tbody = document.getElementById(`hbody-${esc}`);
    if (!tbody) return;
    const data = holdings[name] || [];

    if (!data.length) {
      tbody.innerHTML = `<tr><td colspan="11" style="text-align:center;padding:1.5rem;color:#64748b">No positions yet.</td></tr>`;
      return;
    }

    tbody.innerHTML = data.map(r => `
      <tr id="row-${esc}-${r.id}">
        <td>${r.ticker}</td>
        <td id="cs-${esc}-${r.id}">${fmt.num(r.shares)}</td>
        <td id="ccb-${esc}-${r.id}">${fmt.usd(r.cost_basis)}</td>
        <td id="cpd-${esc}-${r.id}" style="color:#94a3b8">${r.purchase_date ?? "—"}</td>
        <td>${fmt.held(r.days_held)}</td>
        <td>${fmt.usd(r.current_price)}</td>
        <td>${fmt.usd(r.market_value)}</td>
        <td class="${cc(r.pnl_dollars)}">${fmt.usd(r.pnl_dollars)}</td>
        <td class="${cc(r.pnl_pct)}">${fmt.pct(r.pnl_pct)}</td>
        <td class="${cc(r.ann_return_pct)}">${fmt.pct(r.ann_return_pct)}</td>
        <td id="ca-${esc}-${r.id}">
          <button class="edit-btn" onclick="editRow('${name}','${r.id}')">✎</button>
          <button class="del-btn"  onclick="deleteHolding('${name}','${r.id}','${r.ticker}')">✕</button>
        </td>
      </tr>`).join("");
  }

  function sortHoldings(name, th) {
    const col = th.dataset.col;
    const ss  = sortState[name] || { col: null, asc: true };
    const asc = ss.col === col ? !ss.asc : true;
    sortState[name] = { col, asc };

    const esc = CSS.escape(name);
    document.querySelectorAll(`th[data-p="${name}"]`).forEach(t => {
      t.classList.remove("sorted");
      const sa = t.querySelector(".sa"); if (sa) sa.textContent = "↕";
    });
    th.classList.add("sorted");
    const sa = th.querySelector(".sa"); if (sa) sa.textContent = asc ? "↑" : "↓";

    holdings[name] = [...(holdings[name] || [])].sort((a, b) => {
      const av = a[col], bv = b[col];
      if (av == null) return 1; if (bv == null) return -1;
      return typeof av === "string"
        ? (asc ? av.localeCompare(bv) : bv.localeCompare(av))
        : (asc ? av - bv : bv - av);
    });
    renderHoldings(name);
  }

  /* ── Edit ── */
  function editRow(name, lotId) {
    const esc = CSS.escape(name);
    const r   = (holdings[name] || []).find(x => x.id === lotId);
    if (!r) return;
    document.getElementById(`cs-${esc}-${lotId}`).innerHTML =
      `<input class="edit-input" id="es-${esc}-${lotId}" type="number" value="${r.shares}" min="0.0001" step="any">`;
    document.getElementById(`ccb-${esc}-${lotId}`).innerHTML =
      `<input class="edit-input" id="ecb-${esc}-${lotId}" type="number" value="${r.cost_basis}" min="0.0001" step="any">`;
    document.getElementById(`cpd-${esc}-${lotId}`).innerHTML =
      `<input class="edit-input edit-input-date" id="epd-${esc}-${lotId}" type="date" value="${r.purchase_date ?? ""}">`;
    document.getElementById(`ca-${esc}-${lotId}`).innerHTML =
      `<button class="save-btn"   onclick="saveEdit('${name}','${lotId}')">✓</button>` +
      `<button class="cancel-btn" onclick="renderHoldings('${name}')">✕</button>`;
    document.getElementById(`es-${esc}-${lotId}`)?.focus();
  }

  async function saveEdit(name, lotId) {
    const esc         = CSS.escape(name);
    const shares      = parseFloat(document.getElementById(`es-${esc}-${lotId}`)?.value);
    const costBasis   = parseFloat(document.getElementById(`ecb-${esc}-${lotId}`)?.value);
    const purchaseDt  = document.getElementById(`epd-${esc}-${lotId}`)?.value || "";
    if (isNaN(shares) || isNaN(costBasis) || shares <= 0 || costBasis <= 0) {
      alert("Shares and Cost Basis must be positive numbers."); return;
    }
    try {
      const res  = await fetch(`/api/portfolios/${encodeURIComponent(name)}/holdings/${lotId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ shares, cost_basis: costBasis, purchase_date: purchaseDt }),
      });
      const json = await res.json();
      if (json.status !== "ok") throw new Error(json.message);
      await Promise.all([loadHoldings(name), reloadActiveChart(name)]);
      loadPortfolios();
    } catch (err) { alert("Error saving: " + err.message); }
  }

  /* ── Delete holding ── */
  async function deleteHolding(name, lotId, ticker) {
    if (!confirm(`Remove ${ticker} lot from "${name}"?`)) return;
    try {
      const res  = await fetch(`/api/portfolios/${encodeURIComponent(name)}/holdings/${lotId}`, { method: "DELETE" });
      const json = await res.json();
      if (json.status !== "ok") throw new Error(json.message);
      await Promise.all([loadHoldings(name), reloadActiveChart(name)]);
      loadPortfolios();
    } catch (err) { alert("Error: " + err.message); }
  }

  /* ── Add holding ── */
  async function submitAdd(name) {
    const esc    = CSS.escape(name);
    const ticker = document.getElementById(`ft-${esc}`)?.value.trim().toUpperCase();
    const shares = parseFloat(document.getElementById(`fs-${esc}`)?.value);
    const cb     = parseFloat(document.getElementById(`fcb-${esc}`)?.value);
    const pd     = document.getElementById(`fpd-${esc}`)?.value || "";
    const msg    = document.getElementById(`fmsg-${esc}`);
    const btn    = document.getElementById(`fab-${esc}`);

    if (!ticker || isNaN(shares) || isNaN(cb)) {
      msg.textContent = "Ticker, Shares, and Cost Basis are required."; msg.style.color = "#f87171"; return;
    }
    btn.disabled = true; btn.textContent = "Adding…"; msg.textContent = "";
    try {
      const res  = await fetch(`/api/portfolios/${encodeURIComponent(name)}/holdings`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ticker, shares, cost_basis: cb, purchase_date: pd }),
      });
      const json = await res.json();
      if (json.status !== "ok") throw new Error(json.message);
      document.getElementById(`ft-${esc}`).value  = "";
      document.getElementById(`fs-${esc}`).value  = "";
      document.getElementById(`fcb-${esc}`).value = "";
      document.getElementById(`fpd-${esc}`).value = "";
      msg.textContent = `${ticker} added.`; msg.style.color = "#4ade80";
      await Promise.all([loadHoldings(name), reloadActiveChart(name)]);
      loadPortfolios();
    } catch (err) {
      msg.textContent = err.message; msg.style.color = "#f87171";
    } finally {
      btn.disabled = false; btn.textContent = "+ Add";
    }
  }

  /* ══════════════════════════════════════════
     CHART
  ══════════════════════════════════════════ */

  function activeChartParams(name) {
    const esc = CSS.escape(name);
    const btn = document.querySelector(`#pbtns-${esc} .period-btn.active`);
    if (btn?.dataset.period === "custom") {
      return {
        start: document.getElementById(`crs-${esc}`)?.value || "",
        end:   document.getElementById(`cre-${esc}`)?.value || "",
      };
    }
    return { period: btn?.dataset.period || "1y" };
  }

  function reloadActiveChart(name) {
    const p = activeChartParams(name);
    return "start" in p
      ? loadChart(name, "1y", p.start, p.end)
      : loadChart(name, p.period);
  }

  function applyCustomRange(name) {
    const esc = CSS.escape(name);
    const msg = document.getElementById(`crm-${esc}`);
    const { start, end } = activeChartParams(name);
    if (!start || !end) { msg.textContent = "Pick both dates."; return; }
    if (start >= end)   { msg.textContent = "Start must be before end."; return; }
    msg.textContent = "";
    loadChart(name, "1y", start, end);
  }

  async function loadChart(name, period = "1y", start = null, end = null) {
    const esc     = CSS.escape(name);
    const loading = document.getElementById(`cl-${esc}`);
    if (!loading) return;
    loading.style.display = "flex";

    const params = (start && end)
      ? `start=${start}&end=${end}`
      : `period=${period}`;
    try {
      const res  = await fetch(`/api/portfolios/${encodeURIComponent(name)}/history?${params}`);
      const json = await res.json();
      if (json.status !== "ok") throw new Error(json.message);
      const { dates, series } = json;
      const tickers  = Object.keys(series);
      const datasets = tickers.map((t, i) => ({
        label: t, data: series[t],
        borderColor: COLORS[i % COLORS.length],
        backgroundColor: "transparent",
        borderWidth: 2, pointRadius: 0, tension: 0.2, spanGaps: true,
      }));

      if (charts[name]) {
        charts[name].data.labels   = dates;
        charts[name].data.datasets = datasets;
        charts[name].update();
      } else {
        const canvas = document.getElementById(`chart-${esc}`);
        if (!canvas) return;
        charts[name] = new Chart(canvas.getContext("2d"), {
          type: "line",
          data: { labels: dates, datasets },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: "index", intersect: false },
            plugins: {
              legend: {
                position: "top", align: "end",
                labels: { color: "#94a3b8", boxWidth: 12, boxHeight: 2, padding: 14, font: { size: 11 } },
              },
              tooltip: {
                backgroundColor: "#1e2332", borderColor: "#2d3748", borderWidth: 1,
                titleColor: "#94a3b8", bodyColor: "#e2e8f0", padding: 10,
                callbacks: {
                  title: items => items[0]?.label
                    ? new Date(items[0].label).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })
                    : "",
                  label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y != null ? (ctx.parsed.y >= 0 ? "+" : "") + ctx.parsed.y.toFixed(2) + "%" : "—"}`,
                },
              },
            },
            scales: {
              x: {
                type: "time",
                time: {
                  tooltipFormat: "yyyy-MM-dd",
                  displayFormats: { day: "MMM d", week: "MMM d", month: "MMM yyyy", year: "yyyy" },
                },
                ticks: { color: "#475569", font: { size: 10 }, maxRotation: 0, maxTicksLimit: 8 },
                grid: { color: "#1a1f2e" },
              },
              y: {
                ticks: { color: "#475569", font: { size: 10 }, callback: v => (v >= 0 ? "+" : "") + v + "%" },
                grid: { color: "#1a1f2e" },
              },
            },
          },
        });
      }
    } catch (err) {
      if (loading) { loading.textContent = "Chart error: " + err.message; loading.style.color = "#f87171"; return; }
    }
    if (loading) loading.style.display = "none";
  }

  /* ══════════════════════════════════════════
     PORTFOLIO CRUD
  ══════════════════════════════════════════ */

  async function createPortfolio() {
    const input = document.getElementById("new-p-name");
    const msg   = document.getElementById("new-p-msg");
    const name  = input?.value.trim();
    if (!name) { msg.textContent = "Enter a name."; msg.style.color = "#f87171"; return; }
    msg.textContent = "";
    try {
      const res  = await fetch("/api/portfolios", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name }),
      });
      const json = await res.json();
      if (json.status !== "ok") throw new Error(json.message);
      if (input) input.value = "";
      await loadPortfolios();
    } catch (err) {
      msg.textContent = err.message; msg.style.color = "#f87171";
    }
  }

  async function deletePortfolio(name) {
    if (!confirm(`Delete portfolio "${name}" and all its holdings?`)) return;
    if (expanded === name) expanded = null;
    if (charts[name]) { charts[name].destroy(); delete charts[name]; }
    delete holdings[name];
    try {
      const res  = await fetch(`/api/portfolios/${encodeURIComponent(name)}`, { method: "DELETE" });
      const json = await res.json();
      if (json.status !== "ok") throw new Error(json.message);
      await loadPortfolios();
    } catch (err) { alert("Error: " + err.message); }
  }

  // Enter key on new-portfolio input (attached after render in loadPortfolios)

  /* ══════════════════════════════════════════
     EXCEL IMPORT
  ══════════════════════════════════════════ */

  async function importFile(event) {
    const file  = event.target.files[0];
    if (!file) return;
    const label  = document.getElementById("upload-label");
    const result = document.getElementById("import-result");

    label.classList.add("loading");
    label.childNodes[0].textContent = " Importing…";
    result.innerHTML = "";

    const form = new FormData();
    form.append("file", file);

    try {
      const res  = await fetch("/api/import", { method: "POST", body: form });
      const json = await res.json();

      if (json.status !== "ok") {
        result.innerHTML = `<span class="err">Error: ${json.message}</span>`;
      } else {
        const { imported, skipped, errors } = json;
        let html = `<span class="ok">✓ ${imported} row${imported !== 1 ? "s" : ""} imported</span>`;
        if (skipped)         html += `<span class="warn">  · ${skipped} skipped</span>`;
        if (errors?.length)  html += `<span class="warn">  · ${errors.length} error${errors.length !== 1 ? "s" : ""}:
          <ul style="margin:0.25rem 0 0 1rem">${errors.map(e => `<li>${e}</li>`).join("")}</ul></span>`;
        result.innerHTML = html;
        if (imported > 0) await loadPortfolios();
      }
    } catch (err) {
      result.innerHTML = `<span class="err">Upload failed: ${err.message}</span>`;
    } finally {
      label.classList.remove("loading");
      label.childNodes[0].textContent = " Import File";
      event.target.value = "";   // allow re-uploading the same file
    }
  }

  // boot
  loadPortfolios();
</script>
</body>
</html>
